<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-https://script.google.com/macros/s/AKfycbwi_vF2ERU57BFJ99fyUYIEclVPk97tCmO6g_Qkz0F50jY0VfLsqCKpGJKZi-5aa7BMEw/exec8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโรงเรียนกุศลวิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-green-50 font-sans text-gray-800">

    <nav class="bg-emerald-600 p-4 text-white flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold">🏫 กุศลวิทยา การเกษตร</h1>
        <div id="admin-nav-area">
            <button onclick="showAdminLogin()" id="admin-btn" class="bg-white text-emerald-700 px-4 py-2 rounded-lg font-semibold hover:bg-emerald-100 transition">
                <i class="fas fa-user-shield"></i> Admin
            </button>
        </div>
    </nav>

    <div id="app" class="container mx-auto p-4">
        <div id="home-view" class="text-center py-20">
            <h2 class="text-3xl font-bold mb-6 text-emerald-800">ยินดีต้อนรับสู่ระบบติดตามการเจริญเติบโต</h2>
            <button onclick="showUserView()" class="bg-emerald-500 text-white px-8 py-4 rounded-xl text-lg hover:bg-emerald-600 shadow-xl transition transform hover:scale-105">
                <i class="fas fa-seedling"></i> เข้าสู่ระบบนักเรียน
            </button>
        </div>

        <div id="user-view" class="hidden space-y-10">
            <div id="classroom-container" class="space-y-8"></div>
        </div>

        <div id="group-view" class="hidden bg-white p-6 rounded-2xl shadow-lg mt-6">
            <button onclick="showUserView()" class="text-gray-500 mb-4"><i class="fas fa-arrow-left"></i> ย้อนกลับ</button>
            <h2 id="group-title" class="text-2xl font-bold mb-4"></h2>
            
            <div class="space-y-4">
                <div id="admin-controls" class="hidden bg-yellow-50 p-4 rounded-lg border border-yellow-200">
                    <h3 class="font-bold text-yellow-800 mb-2">⚙️ โหมด Admin (ควบคุม)</h3>
                    <div class="flex gap-2">
                        <button onclick="editGroupData()" class="bg-yellow-600 text-white px-4 py-1 rounded text-sm hover:bg-yellow-700">แก้ไขข้อมูลกลุ่ม</button>
                        <button onclick="resetWaterStatus()" class="bg-red-600 text-white px-4 py-1 rounded text-sm hover:bg-red-700">รีเซ็ตสถานะรดน้ำ</button>
                    </div>
                </div>

                <div class="border p-4 rounded-lg">
                    <label>อัปเดตรูปภาพผลผลิต:</label>
                    <input type="file" class="block w-full mt-2">
                    <button onclick="analyzePlantAI()" class="mt-3 bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">✨ วิเคราะห์ผลผลิตด้วย AI</button>
                    <p id="ai-result" class="mt-2 text-sm text-purple-700 italic"></p>
                </div>

                <div class="flex items-center space-x-4">
                    <button onclick="toggleWater()" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">รดน้ำแล้วหรือยัง?</button>
                    <span id="water-status" class="text-gray-600 font-semibold">สถานะ: ยังไม่ได้รดน้ำ</span>
                </div>
                <div class="mt-4">
                    <label>รายชื่อสมาชิกในกลุ่ม:</label>
                    <div id="member-list" class="flex flex-wrap gap-2 mt-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6">
        <button onclick="askAIAssistant()" class="bg-purple-600 text-white p-4 rounded-full shadow-2xl hover:bg-purple-700 transition">
            <i class="fas fa-robot text-2xl"></i>
        </button>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-xl w-80">
            <h3 class="font-bold mb-4">รหัสผ่าน Admin</h3>
            <input type="password" id="admin-pass" class="w-full border p-2 mb-4 rounded" placeholder="111111">
            <div class="flex justify-end gap-2">
                <button onclick="closeAdmin()" class="px-4 py-2 text-gray-500">ยกเลิก</button>
                <button onclick="checkAdmin()" class="bg-emerald-600 text-white px-4 py-2 rounded">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let isAdmin = false;
        const classes = [
            { name: "ม.1", plant: "พืชทั่วไป" },
            { name: "ม.4", plant: "เมล่อน" },
            { name: "ม.5", plant: "เมล่อน" },
            { name: "ม.6", plant: "มะเขือเทศ" }
        ];

        async function callGemini(promptText) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "ขออภัย ระบบ AI ขัดข้องในขณะนี้";
            }
        }

        async function analyzePlantAI() {
            document.getElementById('ai-result').innerText = "✨ กำลังให้ AI วิเคราะห์การเจริญเติบโต...";
            const result = await callGemini("วิเคราะห์การเจริญเติบโตของพืชเกษตรให้หน่อยอย่างสร้างสรรค์และให้กำลังใจนักเรียน");
            document.getElementById('ai-result').innerText = "✨ AI: " + result;
        }

        async function askAIAssistant() {
            const prompt = prompt("ต้องการถาม AI ผู้ช่วยเรื่องอะไรเกี่ยวกับการเกษตร?");
            if (prompt) {
                const answer = await callGemini(prompt);
                alert("✨ AI ที่ปรึกษา: " + answer);
            }
        }

        function editGroupData() {
            const newName = prompt("กรุณาใส่ชื่อกลุ่มที่ต้องการแก้ไข:");
            if(newName) {
                document.getElementById('group-title').innerText = newName;
                alert("บันทึกการแก้ไขข้อมูลเรียบร้อยแล้ว");
            }
        }

        function renderClasses() {
            const container = document.getElementById('classroom-container');
            container.innerHTML = classes.map(c => `
                <div>
                    <h3 class="text-xl font-bold text-emerald-700 mb-4">${c.name} (ปลูก${c.plant})</h3>
                    <div class="grid md:grid-cols-3 gap-4">
                        ${[1, 2, 3].map(g => `
                            <div onclick="showGroup('${c.name} กลุ่ม ${g}')" class="bg-white p-4 rounded-xl shadow border-l-4 border-emerald-500 cursor-pointer hover:bg-emerald-50 transition">
                                <p class="font-bold">กลุ่มที่ ${g}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showUserView() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('group-view').classList.add('hidden');
            document.getElementById('user-view').classList.remove('hidden');
            renderClasses();
        }

        function showGroup(name) {
            document.getElementById('user-view').classList.add('hidden');
            document.getElementById('group-view').classList.remove('hidden');
            document.getElementById('group-title').innerText = name;
            document.getElementById('admin-controls').classList.toggle('hidden', !isAdmin);
            const members = ["นายกุศล", "นางสาววิทยา", "นายเกษตร"];
            document.getElementById('member-list').innerHTML = members.map(m => `<span class="bg-gray-200 px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-emerald-200">${m}</span>`).join('');
        }

        function showAdminLogin() { document.getElementById('admin-modal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        
        function checkAdmin() {
            if(document.getElementById('admin-pass').value === '111111') {
                isAdmin = true;
                alert('ยินดีต้อนรับ Admin!');
                document.getElementById('admin-nav-area').innerHTML = '<span class="text-white font-bold bg-yellow-500 px-3 py-1 rounded"><i class="fas fa-crown"></i> Admin Logged In</span>';
                closeAdmin();
            } else {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        }

        function toggleWater() { document.getElementById('water-status').innerText = "สถานะ: รดน้ำแล้ว! ✅"; }
        function resetWaterStatus() {
            document.getElementById('water-status').innerText = "สถานะ: ยังไม่ได้รดน้ำ";
            alert('รีเซ็ตสถานะเรียบร้อย');
        }
    </script>
</body>
</html>
